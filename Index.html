<!doctype html>
<html lang="DE">
  <head>
    <title>LinkTree-Antonio</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <main>
      <div class="container">
        <img
          src="Downloads\Guts2.jpg"
          alt="Profile Image"
          class="profile-pic"
        />
        <h1>Antonio</h1>
        <br />
        <p class="about">
          Wilkommen zu meinem LinkTree! Ich bin ein angehender
          Anwendungsentwickler, der sich für das Erstellen von schönen und
          funktionalen Websites/Apps begeistert.
        </p>
        <div class="links">
          <a
            href="https://github.com/ImTheFake"
            class="link-button"
            target="_blank"
            ><i class="fa-brands fa-github"></i>GitHub</a
          >
          <a
            href="https://www.linkedin.com/in/antonio-van-londen/"
            class="link-button"
            target="_blank"
            ><i class="fa-brands fa-linkedin"></i>LinkedIn</a
          >
          <a
            href="https://www.codedex.io/@ImTheFake"
            class="link-button"
            target="_blank"
            ><i class="fa-solid fa-code"></i>Codedex</a
          >
          <a
            href="https://www.instagram.com/imthefake_dev/"
            class="link-button"
            target="_blank"
            ><i class="fa-brands fa-instagram"></i>Instagram</a
          >
          <a
            href="Downloads/Lebenslauf.pdf"
            class="link-button"
            id="Download-button"
            target="_blank"
            download="Antonios_Lebenslauf.pdf"
            ><i class="fa-solid fa-download"></i>Lebenslauf</a
          >
        </div>
      </div>
    </main>
  </body>
</html>
